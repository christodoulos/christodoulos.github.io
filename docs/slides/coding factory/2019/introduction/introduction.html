# Τι είναι το Angular Framework

* Είναι ένα πλαίσιο (framework) ανάπτυξης εφαρμογών ιστού (web applications)
* Xρήση της γλώσσας προγραμματισμού Javascript/Typescript
* Οι εφαρμογές που αναπτύσσονται ονομάζονται *Single Page Applications (SPA)*
* Μια SPA *τρέχει* σε μια διεύθυνση (URL) στο internet
* Eνώ κατά τη χρήση της εφαρμογής το URL αλλάζει η σελίδα δεν ανανεώνεται
  (refresh)

## Τυπική χρήση (τελικός στόχος της ενότητας):

* συντάσσονται HTML templates με χρήση των επεκτάσεων του Angular
* αναπτύσσονται component classes που χειρίζονται τα templates
* η λογική της εφαρμογής αναπτύσσεται στα services
* τα componets και τα services _πακετάρονται_ σε modules

# Εγκατάσταση του Angular CLI

Το .alt[Angular CLI] (Angular Command Line Interface) προσφέρει διάφορες
γεννήτριες κώδικα μέσω ειδικών εντολών που διευκολύνουν την ανάπτυξη με το
Angular Framework.

Χρησιμοποιούμε το εργαλείο .alt[npm] από την εγκατάσταση του .alt[Node.js]

```
npm install -g @angular/cli@latest
...
+ @angular/cli@7.3.9
added 295 packages from 180 contributors in 4.122s
```

Η εγκατάσταση ενδέχεται να διαρκέσει μερικά λεπτά. Στη συνέχεια όλα τα εργαλεία
του .alt[Angular CLI] είναι διαθέσιμα.

# Τι έχει συμβεί;

* Το *View Source* στον browser είναι ο κώδικας της εφαρμογής μας (HTML και Javascript)
* Το αρχείο στο δίσκο *εμπλουτίστηκε* αυτόματα με κώδικα Javascript
* Η HTML στον browser είναι επίσης *εμπλουτισμένη* με ένα νέο .alt[tag]
* To `<app-root></app-root>` δεν ανήκει στην τυπική HTML
* Το tag `app-root` *οριοθετεί* την εφαρμογή μας μέσα στη σελίδα
* Το νέο tag έχει αποτέλεσμα **μόνο** σε συνδυασμό με τη Javascript του εμπλουτισμένου αρχείου
* Όμως ο κώδικας στον browser *δεν θυμίζει* την όψη της σελίδας!

> Στη σελίδα φαίνεται το αποτέλεσμα του κώδικα της εφαρμογής Angular
> (εμπλουτισμένη HTML + Javascript)

# Η σελίδα *τρέχει* μια εφαρμογή Angular

Ο κώδικας της εφαρμογής Angular βρίσκεται στον κατάλογο `app` μέσα στον κατάλογο
`src`:

```bash
...
├── src
│  ├── app
│  │  ├── app.component.css
│  │  ├── app.component.html
│  │  ├── app.component.spec.ts
│  │  ├── app.component.ts
│  │  └── app.module.ts
... ...
```

* Κάθε εφαρμογή Angular περιέχεται σε ένα Typescript module (`app.module.ts`)
* To Typescript module περιέχει τουλάχιστον ένα Angular component (`app.component.ts`)
* Κάθε component έχει ένα template (HTML + CSS) (`app.component.html` και `app.component.css`)

# To `app.component.html` είναι μια *δυναμική σελίδα*

* Παρατηρούμε πως η γραμμή της HTML: `<h2> This is {{title}}! </h2>`
* Εμφανίζεται σαν: **This is my-first-angular-app!**
* Γιατί λειτουργεί σε συνδυασμό με το `app.component.ts`:

```typescript
import { Component } from '@angular/core';
@Component({
  selector: 'app-root',                  // Ορισμός νέου HTML tag
  templateUrl: './app.component.html',
  styleUrls: ['./app.component.css']
})
export class AppComponent {
  title = 'my-first-angular-app';        // Μεταβλητή της εφαρμογής μας
}
```

# Angular Data Binding

Angular component

`app.component.ts`

```typescript
import { Component } from '@angular/core';
@Component({
  selector: 'app-root',
  templateUrl: './app.component.html',
  styleUrls: ['./app.component.css']
})
export class AppComponent {
  title = 'Hello World Angular!';
}
```

Angular template

`app.component.html`

```html
<div style="text-align:center">
  <h1>Hello stranger!</h1>
  <h2> This is {{title}}!</h2>
</div>
<h2>Here are some links ... </h2>
<ul>
  <li>
  ...
</ul>
```

* Η τιμή του `title` θα μπορούσε να προέρχεται από υπολογισμό
* Ή θα μπορούσε να ανακτηθεί από ένα web service

# Two way Data Binding

## Δυναμική σύνδεση component και template

Οι αλλαγές της μεταβλητής στο component αντικατοπτρίζονται άμεσα στο template, αλλά και οι αλλαγές στο template αντικατροπτίζονται άμεσα στο component.

`app.component.ts`

```typescript
import { Component } from '@angular/core';
@Component({
  selector: 'app-root',
  templateUrl: './app.component.html',
  styleUrls: ['./app.component.css']
})
export class AppComponent {
  name = 'Christodoulos';
}
```

`app.component.html`

```typescript
<input type="text" [(ngModel)]="name">
<p>
    Hello !
</p>
```

To `ngModel` είναι μια .alt[Angular οδηγία (directive)] που συνδέει το περιεχόμενο του πλαίσιου εισόδου HTML (input tag) στο template με μια μεταβλητή του component

# Το πρώτο μήνυμα λάθους


## `app.component.html`

```html
<input type="text" [(ngModel)]="name">
<p>
    Hello !
</p>
```

* H εφαρμογή μας δεν γνωρίζει την οδηγία `ngModel` για το input tag
* Πρέπει να χρησιμοποιήσουμε την κατάλληλη ενότητα (module) του Angular που παρέχει την οδηγία `ngModel`
