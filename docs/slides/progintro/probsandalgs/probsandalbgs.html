# Εισαγωγή στον προγραμματισμό
## Υπολογιστικά προβλήματα

---

# Τι είναι πρόβλημα;

- Είναι κάθε _κατάσταση_ που πρέπει να _αντιμετωπιστεί_ και απαιτεί **λύση**.
- Η _λύση_ δεν είναι γνωστή και όχι προφανής.

## Κατανόηση προβλήματος

- Η _λύση_ που θα δοθεί σε ένα πρόβλημα θα είναι **λάθος** αν το πρόβλημα δεν γίνει
  **απόλυτα κατανοητό**:
  - Χρειάζεται σωστή **διατύπωση** από αυτόν που _θέτει_ το πρόβλημα.
  - Χρειάζεται σωστή **ερμηνεία** από αυτόν που το _επιλύει_.
- Η _κατανόηση_ ενός προβλήματος εξαρτάται άμεσα από τη διατύπωσή του.
- Συνηθέστερο μέσο διατύπωσης είναι ο γραπτός ή προφορικός λόγος.

---

# Σαφήνεια στη διατύπωση και σωστή ερμηνεία

Ο λόγος στην επικοινωνία και τη συνεννόηση είναι συχνά ασαφής:

- άστοχη χρήση ορολογίας,
- λανθασμένη σύνταξη.

Η _παρερμηνεία_ είναι δυνατή ακόμη κι αν τηρούνται όλοι οι λεξικολογικοί και
συντακτικοί κανόνες:

> H Μαρία απευθύνεται στο Γιάννη: θα συναντήσω τους παιδικούς μου φίλους το
> βράδυ, μπορείς να αγοράσεις γι' αυτούς δώρα; Ο Κώστας και η Ελένη είναι
> παντρεμένοι. Ο Γιώργος είναι ορειβάτης. Η Ιωάννα είναι λογίστρια.

Ο Γιάννης αγόρασε 3 δώρα, όμως η Μαρία περίμενε 4.

---

# Ορισμοί

**Δεδομένο** είναι οποιοδήποτε στοιχείο μπορεί να γίνει αντιληπτό.

**Πληροφορία** είναι οποιαδήποτε γνώση προέρχεται από _επεξεργασία δεδομένων_.

**Επεξεργασία δεδομένων** είναι η διαδικασία που:

- ένας _μηχανισμός_ δέχεται δεδομένα,
- τα _επεξεργάζεται_ με _προκαθορισμένο_ τρόπο και
- αποδίδει _πληροφορίες_.

**Μηχανισμός επεξεργασίας δεδομένων** ήταν και είναι ο ανθρώπινος εγκέφαλος.
Άλλος μηχανισμός επεξεργασίας δεδομένων είναι ο **υπολογιστής**.

# Ανάλυση προβλήματος

- Ανάλυση του προβλήματος σε άλλα απλούστερα προβλήματα
- Κατανόηση της δομής του προβλήματος
- Διαγραμματική αναπαράσταση:
 - Το αρχικό πρόβλημα είναι στην κορυφή
 - Κάθε απλούστερο πρόβλημα βρίσκεται ένα επίπεδο χαμηλότερα
 - Σε κάθε κατώτερο επίπεδο αναλύεται το υποπρόβλημα του αμέσως υψηλότερου επιπέδου

> Η λύση του προβλήματος _συντίθεται_ από τις επιμέρους λύσεις των υποπροβλημάτων

# Υπολογισμός αθροίσματος δύο αριθμών

> Να διαβαστούν δύο αριθμοί, να υπολογισθεί και να εκτυπωθεί το άθροισμά τους.

### Εντολή εκχώρησης τιμής

####Μεταβλητή 🠀 Έκφραση

- Γίνονται οι πράξεις στην _έκφραση_ και το αποτέλεσμα εκχωρείται στη _μεταβλητή_.
- Δεν πρόκειται για την εξίσωση \\(c = a + b\\).

# Απόλυτη τιμή αριθμού

> Να διαβαστεί ένας αριθμός και να εκτυπωθεί η απόλυτη τιμή του.

### Συλλογισμός

- Αν ο αριθμός είναι θετικός ή μηδέν τότε απόλυτη τιμή του είναι ο ίδιος ο αριθμός.
- Αν ο αριθμός είναι αρνητικός τότε απόλυτη τιμή του είναι ο αντίθετός του.
- Τελικά αρκεί ένας έλεγχος, αν ο αριθμός είναι αρνητικός και στην περίπτωση αυτή να
  βρεθεί ο αντίθετός του.

# Υλοποίηση απόλυτης τιμής

Matlab
```matlab
a = input()
if a < 0
  a = a * (-1)
end
disp(a)
```

Python
```python
a = raw_input(a)
if a < 0:
  a = a * (-1)
print(a)
```
