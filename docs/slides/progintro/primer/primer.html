# Το λειτουργικό σύστημα

- Είναι το μέσο επικοινωνίας με το υλικό του υπολογιστή
- Σκοπός είναι οι επιστημονικοί υπολογισμοί
- Μεγάλες ανάγκες εκμετάλλευσης των υπολογιστικών πόρων
- Πολλά δεδομένα
- Χρειάζεται περιβάλλον με ευελιξία, αξιοπιστία, απλότητα
- Διαθέσιμα δυνατά εργαλεία για προγραμματισμό ...
- Εμπορικά λογισμικά δεν γίνεται να κάνουν τα πάντα
- Πρέπει να έχεις ο ίδιος τη δυνατότητα να προγραμματίζεις αυτό που θέλεις

# Το σύστημα αρχείων

Όλες οι πληροφορίες που είναι αποθηκευμένες στον υπολογιστή είναι αρχεία.
Μεταξύ άλλων:

- αρχεία κειμένου (π.χ. το βιογραφικό σας σημείωμα ή οι εργασίες σας)
- εκτελέσιμα προγράμματα (π.χ. η σουίτα γραφείου Libre Office ή Microsoft Office)
- συσκευές (π.χ. οι σκληροί δίσκοι ή η οθόνη)

Η _συνηθέστερη_ εφαρμογή (όχι η καλύτερη δυνατή) επισκόπησης του συστήματος
αρχείων στον υπολογιστή είναι ο Windows Explorer
